<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mehndi | Yaadgar Events Planner</title>
<meta name="description" content="Vibrant mehndi stage decor by Yaadgar Events Planner — floral installations, lighting and traditional styling.">
<link rel="icon" href="images/logo/favicon.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Jost:wght@400;500;600&family=Mrs+Saint+Delafield&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body data-page="events">

<div class="preloader" id="preloader"><div class="preloader-mark"><img src="images/logo/logo-cream.png" alt="Loading"><div class="preloader-bar"></div></div></div>

<div id="header-mount"></div>

<div id="event-hero-mount"></div>
<div id="event-intro-mount"></div>
<div id="event-gallery-mount"></div>

<section class="cta-band">
  <div class="container reveal">
    <p class="eyebrow center" style="color:var(--bronze-light)">Ready When You Are</p>
    <h2>Let's Make Your Mehndi Memorable</h2>
    <div class="actions">
      <a href="book.html" class="btn btn-gold">Book Now</a>
      <a href="events.html" class="btn btn-outline on-dark">Back To All Events</a>
    </div>
  </div>
</section>

<div id="footer-mount"></div>
<div id="float-mount"></div>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose" aria-label="Close"><svg style="width:18px;height:18px"><use href="#icon-close"/></svg></button>
  <button class="lightbox-nav prev" id="lightboxPrev" aria-label="Previous"><svg style="width:18px;height:18px;transform:rotate(180deg)"><use href="#icon-arrow-right"/></svg></button>
  <img id="lightboxImg" src="" alt="">
  <button class="lightbox-nav next" id="lightboxNext" aria-label="Next"><svg style="width:18px;height:18px"><use href="#icon-arrow-right"/></svg></button>
  <p class="lightbox-caption" id="lightboxCaption"></p>
</div>

<script src="js/main.js"></script>
<script>
  const EVENT_DATA = {
    slug: 'mehndi',
    title: 'Mehndi',
    icon: 'icon-cat-henna',
    heroImg: 'mehndi/mehndi-2.jpg',
    metaDescription: "Vibrant mehndi stage decor by Yaadgar Events Planner — floral installations, lighting and traditional styling.",
    intro: "Vibrant colour, floral installations and traditional touches for a mehndi stage guests will be talking about long after the night ends.",
    priceNote: "Prices below are per photographed setup and vary with venue size and add-ons.",
    gallery: [
      { src: 'mehndi/mehndi-1.jpg', alt: 'photo 1', price: 'PKR 40,000' },
      { src: 'mehndi/mehndi-2.jpg', alt: 'photo 2', price: 'PKR 45,000' },
      { src: 'mehndi/mehndi-3.jpg', alt: 'photo 3', price: 'PKR 50,000' },
      { src: 'mehndi/mehndi-4.jpg', alt: 'photo 4', price: 'PKR 55,000' },
      { src: 'mehndi/mehndi-5.jpg', alt: 'photo 5', price: 'PKR 60,000' },
      { src: 'mehndi/mehndi-6.jpg', alt: 'photo 6', price: 'PKR 65,000' },
      { src: 'mehndi/mehndi-7.jpg', alt: 'photo 7', price: 'PKR 70,000' },
      { src: 'mehndi/mehndi-8.jpg', alt: 'photo 8', price: 'PKR 75,000' }
    ]
  };

  document.addEventListener('DOMContentLoaded', () => {
    initLayout('events');
    initEventDetailPage(EVENT_DATA);
  });
</script>
</body>
</html>
